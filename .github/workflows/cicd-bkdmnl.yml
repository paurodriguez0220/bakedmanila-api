name: "BakedManila API CICD"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-test:
    name: "Build and test"
    runs-on: ubuntu-latest
    env:
      # Ephemeral, single-run CI container credential derived from the run id — not a real
      # secret, never reused outside this job. Single source: the service container env and
      # the test connection template both consume this value.
      MSSQL_SA_PASSWORD: 'CI_Passw0rd_${{ github.run_id }}!'
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: ${{ env.MSSQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        # The health command runs inside the container, where MSSQL_SA_PASSWORD is set above —
        # $MSSQL_SA_PASSWORD expands at container runtime, keeping the password single-sourced.
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $MSSQL_SA_PASSWORD -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout api repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Create empty wwwroot
        # wwwroot is gitignored (CI drops the SPA build there at deploy time); tests that host
        # the API in the Development environment need the web root directory to exist.
        run: mkdir -p src/BakedManila.Api/wwwroot

      - name: Run tests
        run: dotnet test --configuration Release
        env:
          TEST_SQL_CONNECTION_TEMPLATE: "Server=localhost,1433;Database={db};User Id=sa;Password=${{ env.MSSQL_SA_PASSWORD }};TrustServerCertificate=True;MultipleActiveResultSets=true"

  deploy:
    name: "Deploy to Azure"
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout api repository
        uses: actions/checkout@v4

      - name: Validate required OIDC variables
        run: |
          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID must be set as repository or environment variables — aborting"
            exit 1
          fi
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Checkout web repository
        uses: actions/checkout@v4
        with:
          repository: paurodriguez0220/bakedmanila-web
          path: web

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web storefront
        run: npm run build
        working-directory: web
        env:
          VITE_API_BASE_URL: ''

      - name: Copy web build into API wwwroot
        run: |
          mkdir -p src/BakedManila.Api/wwwroot
          cp -r web/dist/. src/BakedManila.Api/wwwroot/

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: dotnet publish src/BakedManila.Api/BakedManila.Api.csproj -c Release -o publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-bkdmnl-prod-sea
          package: publish

  smoke:
    name: "Smoke test"
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify storefront responds
        # Retries tolerate cold start after deploy: App Service warmup, Key Vault reference
        # resolution, and the SQL serverless database resuming from auto-pause can all take
        # the first request(s) past a single-shot timeout.
        run: |
          max_attempts=10
          for attempt in $(seq 1 "$max_attempts"); do
            status=$(curl -s -o /tmp/root.html -w '%{http_code}' -H 'Accept: text/html' https://app-bkdmnl-prod-sea.azurewebsites.net/ || echo "000")
            if [ "$status" = "200" ] && grep -qi '<html' /tmp/root.html; then
              echo "Storefront responded with HTML on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: storefront returned HTTP $status, retrying in 30s..."
            sleep 30
          done
          echo "::error::Storefront root did not return 200 + HTML after $max_attempts attempts"
          exit 1

      - name: Verify products API responds
        run: |
          max_attempts=10
          for attempt in $(seq 1 "$max_attempts"); do
            status=$(curl -s -o /tmp/products.json -w '%{http_code}' -H 'Accept: application/json' https://app-bkdmnl-prod-sea.azurewebsites.net/api/products || echo "000")
            if [ "$status" = "200" ] && head -c 1 /tmp/products.json | grep -q '\['; then
              echo "/api/products responded with a JSON array on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt/$max_attempts: /api/products returned HTTP $status, retrying in 30s..."
            sleep 30
          done
          echo "::error::/api/products did not return a JSON array after $max_attempts attempts"
          exit 1
